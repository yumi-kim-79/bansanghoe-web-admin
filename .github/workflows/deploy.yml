name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 223.130.156.223
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            export GITHUB_TOKEN=${{ secrets.DEPLOY_TOKEN }}
            BACKUP_DIR="/var/www/html/_backups/$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"

            cd /var/www/html
            git fetch origin main

            # 변경된 파일 목록 추출
            CHANGED_FILES=$(git diff --name-only HEAD origin/main 2>/dev/null)

            # 변경된 파일 백업
            echo "$CHANGED_FILES" | while read file; do
              if [ -f "/var/www/html/$file" ]; then
                mkdir -p "$BACKUP_DIR/$(dirname $file)"
                cp "/var/www/html/$file" "$BACKUP_DIR/$file"
                echo "백업 완료: $file"
              fi
            done

            # 변경된 파일 서버에 배포
            echo "$CHANGED_FILES" | while read file; do
              if [ -n "$file" ]; then
                mkdir -p "/var/www/html/$(dirname $file)"
                curl -s -H "Authorization: token $GITHUB_TOKEN" \
                  -o "/var/www/html/$file" \
                  "https://raw.githubusercontent.com/yumi-kim-79/bansanghoe-web-admin/main/$file"
                echo "배포 완료: $file"
              fi
            done

            # git HEAD 업데이트
            git merge origin/main

            # 오래된 백업 삭제 (30일 이상)
            find /var/www/html/_backups -maxdepth 1 -type d -mtime +30 -exec rm -rf {} \; 2>/dev/null || true

            systemctl restart httpd
            echo "✅ 배포 완료!"
