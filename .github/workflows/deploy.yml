name: Deploy to Server

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 223.130.156.223
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            export GITHUB_TOKEN=${{ secrets.DEPLOY_TOKEN }}

            # 브랜치에 따라 배포 경로 결정
            BRANCH="${{ github.ref_name }}"
            if [ "$BRANCH" = "main" ]; then
              DEPLOY_DIR="/var/www/html"
            else
              DEPLOY_DIR="/var/www/html_test"
            fi

            BACKUP_DIR="${DEPLOY_DIR}/_backups/$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"

            cd $DEPLOY_DIR
            git fetch origin $BRANCH

            CHANGED_FILES=$(git diff --name-only HEAD origin/$BRANCH 2>/dev/null)

            echo "$CHANGED_FILES" | while read file; do
              if [ -f "$DEPLOY_DIR/$file" ]; then
                mkdir -p "$BACKUP_DIR/$(dirname $file)"
                cp "$DEPLOY_DIR/$file" "$BACKUP_DIR/$file"
              fi
            done

            echo "$CHANGED_FILES" | while read file; do
              if [ -n "$file" ]; then
                mkdir -p "$DEPLOY_DIR/$(dirname $file)"
                curl -s -H "Authorization: token $GITHUB_TOKEN" \
                  -o "$DEPLOY_DIR/$file" \
                  "https://raw.githubusercontent.com/yumi-kim-79/bansanghoe-web-admin/$BRANCH/$file"
              fi
            done

            git merge origin/$BRANCH
            find ${DEPLOY_DIR}/_backups -maxdepth 1 -type d -mtime +30 -exec rm -rf {} \; 2>/dev/null || true
            systemctl restart httpd
            echo "✅ $BRANCH → $DEPLOY_DIR 배포 완료!"
